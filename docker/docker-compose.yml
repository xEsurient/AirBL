services:
  airbl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: airbl:latest
    container_name: airbl
    
    # Required for VPN operations (wg, ip link, ip route, etc.)
    cap_add:
      - NET_ADMIN
    
    # Required sysctls for networking
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=1
    
    # Network mode for VPN
    # Use 'host' for full network access (uncomment below and remove ports section)
    # network_mode: host
    
    # Expose web server port
    ports:
      - "5665:5665"
    
    # Optional: Mount custom config file for pre-container configuration
    # This allows you to configure scan regions, servers, and cities before starting the container
    # Example config file format (airbl-config.json):
    # {
    #   "regions": {
    #     "mode": "manual",  # Options: "all", "none", "config_only", "us_only", "asia_only", "europe_only", "manual"
    #     "countries": ["DE", "GB", "US"]  # Required if mode is "manual"
    #   },
    #   "servers": ["Norma", "Segin"],  # Optional: specific server names
    #   "cities": {  # Optional: filter by cities within countries
    #     "GB": ["London"],
    #     "DE": ["Frankfurt"]
    #   }
    # }
    volumes:
      # Mount your WireGuard configs and airbl-config.json
      # Place airbl-config.json in the conf/ directory alongside your .conf files
      - ./conf:/app/conf:ro
      # Persistent data (scan results cache, blocked servers, database)
      # Using bind mount to host for easy access and backup
      # Alternative: Use named volume by replacing with: - airbl_data:/app/data
      - ./data:/app/data
      # Optional: mount Hummingbird binary
      # - ./hummingbird:/usr/local/bin/hummingbird:ro
    
    environment:
      # Scan interval in minutes
      - SCAN_INTERVAL=120
      
      # Web server port
      - PORT=5665
      
      # Config directory (inside container)
      - AIRBL_CONFIG_DIR=/app/conf
      
      # Cache directory (where database and cache files are stored)
      - AIRBL_CACHE_DIR=/app/data
      
      # Optional: Path to JSON config file for pre-container configuration
      # This file should be placed in the conf/ directory alongside your WireGuard .conf files
      # See CONFIG-EXAMPLE.md for example config file format
      - AIRBL_CONFIG_FILE=/app/conf/airbl-config.json
      
      # DNS servers for DroneBL lookups
      - DNS_SERVERS=1.1.1.1,8.8.8.8
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5665/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Separate container for VPN testing
  # This keeps VPN traffic isolated from the main scanner
  airbl-vpn-tester:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: airbl:latest
    container_name: airbl-vpn-tester
    
    cap_add:
      - NET_ADMIN
    
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    
    volumes:
      - ./conf:/app/conf:ro
      # Persistent data (scan results cache, blocked servers, database)
      # Using bind mount to host for easy access and backup
      # Alternative: Use named volume by replacing with: - airbl_data:/app/data
      - ./data:/app/data
    
    environment:
      - SCAN_INTERVAL=0
      # Cache directory (where database and cache files are stored)
      - AIRBL_CACHE_DIR=/app/data
    
    # This container only runs speedtests on demand
    command: ["shell"]
    stdin_open: true
    tty: true
    
    profiles:
      - vpn-testing

# Optional: Use named volume instead of bind mount
# Uncomment below and change volume mounts in services to use: - airbl_data:/app/data
# volumes:
#   airbl_data:
#     driver: local

# Networks are automatically created by docker-compose
# If you need a custom network, uncomment below and remove network_mode from services
networks:
  default:
    name: AirBL
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

